<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>乖乖CC</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap');
  * { margin: 0; padding: 0; }
  html, body {
    overflow: hidden;
    width: 100%;
    height: 100%;
    background: transparent;
    user-select: none;
  }
  body.slapper-mode { cursor: none; }
  canvas { display: block; }

  #counter {
    position: fixed;
    top: 24px;
    right: 32px;
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 28px;
    color: #f5d99a;
    text-shadow: 0 0 20px rgba(245, 180, 60, 0.4);
    z-index: 10;
    pointer-events: none;
    opacity: 0.85;
  }
  body.slapper-mode #counter {
    color: #ff6b6b;
    text-shadow: 0 0 20px rgba(255, 80, 80, 0.4);
  }

  #hint {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 20px;
    color: #a08860;
    text-shadow: 0 0 12px rgba(160, 120, 60, 0.3);
    z-index: 10;
    pointer-events: none;
    animation: pulse 3s ease-in-out infinite;
  }
  body.slapper-mode #hint {
    color: #a07070;
    text-shadow: 0 0 12px rgba(160, 80, 80, 0.3);
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.45; }
    50% { opacity: 0.8; }
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="counter"><span id="counter-label">功德：</span><span id="counter-val">0</span></div>
<div id="hint">上下移動滑鼠拜拜 · 點擊放下香</div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
//  TAURI BRIDGE
// ══════════════════════════════════════════════════════════════════════════════
const IS_TAURI = !!(window.__TAURI__);

async function tauriInvoke(cmd, args) {
  if (IS_TAURI) {
    return window.__TAURI__.core.invoke(cmd, args);
  }
}

async function tauriHideWindow() {
  if (IS_TAURI) {
    return window.__TAURI__.window.getCurrentWindow().hide();
  }
}

function tauriListen(event, callback) {
  if (IS_TAURI) {
    window.__TAURI__.event.listen(event, callback);
  }
}

// ══════════════════════════════════════════════════════════════════════════════
//  MODE
// ══════════════════════════════════════════════════════════════════════════════
let currentMode = 'incense'; // 'incense' | 'slapper'

// ══════════════════════════════════════════════════════════════════════════════
//  SHARED CONFIG
// ══════════════════════════════════════════════════════════════════════════════
const C = {
  // Incense (three sticks)
  stickCount: 3,
  stickLength: 260,
  stickWidth: 3.8,
  stickSpacing: 7,
  stickColor: '#c8553a',
  stickBurnColor: '#e8923a',
  stickAshColor: '#8a8078',
  stickWoodColor: '#d4a06a',
  emberRadius: 4.5,
  emberGlowRadius: 22,
  smokePerFrame: 0.1,
  smokeLifeMin: 90,
  smokeLifeMax: 180,
  smokeRadiusMin: 2,
  smokeRadiusMax: 14,
  smokeRiseSpeed: 0.55,
  smokeDrift: 0.25,
  smokeWind: 0.08,
  smokeTurbFreq: 0.007,
  smokeTurbAmp: 0.45,
  smokeStartAlpha: 0.3,
  smokeColor: [175, 168, 152],
  tiltFactor: 0.002,
  tiltDamping: 0.88,
  tiltReturn: 0.05,
  tiltMax: 0.65,
  swayFactor: 0.004,
  swayDamping: 0.90,
  swayReturn: 0.04,
  swayMax: 0.1,
  bowAmplitude: 60,
  bowsNeeded: 3,
  bowTimeoutMs: 2200,
  bowCooldownMs: 1100,
  incenseMessages: [
    '南無加速菩薩', '施主，快點', '阿彌陀佛，速速完工',
    '善哉善哉，再快一些', '佛曰：不可怠惰',
  ],
  floatTextRise: 0.7,
  floatTextLife: 95,
  dropGravity: 0.45,
  bgAlpha: 0.012,

  // Slapper hand
  slapStickLength: 260,
  slapStickWidth: 8,
  slapGripLength: 55,
  slapGripWidth: 12,
  slapStickColors: ['#e63946', '#457b9d', '#f4a261', '#2a9d8f'],
  slapGripColor: '#222',
  slapGripRidgeColor: '#444',
  slapHandWidth: 70,
  slapHandHeight: 80,
  slapHandColor: '#1a1a1a',
  slapHandOutline: '#333',
  swaySlapFactor: 0.004,
  swaySlapDamping: 0.67,
  swaySlapReturn: 0.035,
  swaySlapMax: 0.7,
  // Joint (second segment)
  jointRatio: 0.2,
  jointFactor: 0.3,
  jointDamping: 0.51,
  jointReturn: 0.04,
  jointMax: 0.2,
  slapAngVelThreshold: 0.22,
  slapCooldownMs: 900,
  slapTriggerChance: 0.28,
  incenseTriggerChance: 0.60,
  shakeIntensity: 14,
  shakeDuration: 10,
  slapMessages: [
    '你看看你！', '隔壁Codex都寫完了！', '隔壁Gemini都寫完了！',
    '啪！', '不打不成器！', '我數到三！', '講幾次了！',
    '你對得起我嗎！', '反了你了！', '皮在癢是不是！',
    '你給我認真點！', '我像你這麼大的時候早就寫完了！',
    '再不快點就別吃飯了！',
  ],
  slapFloatTextLife: 60,
  slapFloatTextRise: 1.2,
};

// ══════════════════════════════════════════════════════════════════════════════
//  SHARED STATE
// ══════════════════════════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const counterValEl = document.getElementById('counter-val');
const counterLabelEl = document.getElementById('counter-label');
const hintEl = document.getElementById('hint');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);
setInterval(resize, 1000);

let mouseX = -1000, mouseY = -1000;
let prevMouseX = mouseX, prevMouseY = mouseY;
let frame = 0;

document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });

// ══════════════════════════════════════════════════════════════════════════════
//  AUDIO
// ══════════════════════════════════════════════════════════════════════════════
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }

function playWoodenFish() {
  ensureAudio();
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(180, now);
  osc.frequency.exponentialRampToValueAtTime(80, now + 0.15);
  gain.gain.setValueAtTime(0.45, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(now); osc.stop(now + 0.4);
}

function playSlap() {
  ensureAudio();
  const now = audioCtx.currentTime;
  // Sharp crack
  const n = audioCtx.createOscillator();
  const ng = audioCtx.createGain();
  n.type = 'sawtooth';
  n.frequency.setValueAtTime(400, now);
  n.frequency.exponentialRampToValueAtTime(80, now + 0.05);
  ng.gain.setValueAtTime(0.6, now);
  ng.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
  n.connect(ng); ng.connect(audioCtx.destination);
  n.start(now); n.stop(now + 0.1);
  // Low thud
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(120, now);
  o.frequency.exponentialRampToValueAtTime(40, now + 0.08);
  g.gain.setValueAtTime(0.4, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(now); o.stop(now + 0.15);
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// ══════════════════════════════════════════════════════════════════════════════
//  INCENSE MODE STATE
// ══════════════════════════════════════════════════════════════════════════════
const incense = {
  merit: 0,
  active: true,
  dropping: false,
  dropVelY: 0, dropPosY: 0, dropRot: 0, dropRotVel: 0,
  tilt: 0, tiltVel: 0,
  sway: 0, swayVel: 0,
  smokeParticles: [],
  floatingTexts: [],
  bowDirections: [], bowLastDir: null, bowStartTime: 0, bowCooldownUntil: 0,
  bowAccumY: 0,
};

function incenseReset() {
  incense.active = true;
  incense.dropping = false;
  incense.tilt = 0; incense.tiltVel = 0;
  incense.sway = 0; incense.swayVel = 0;
  incense.bowDirections = [];
  incense.bowLastDir = null;
  incense.bowAccumY = 0;
  incense.smokeParticles = [];
  incense.floatingTexts = [];
}

function detectBow() {
  if (incense.dropping || !incense.active) return;
  const now = Date.now();
  if (now < incense.bowCooldownUntil) return;

  const dy = mouseY - prevMouseY;
  if (dy === 0) return;

  if (Math.sign(dy) === Math.sign(incense.bowAccumY) || incense.bowAccumY === 0) {
    incense.bowAccumY += dy;
  } else {
    incense.bowAccumY = dy;
  }

  if (Math.abs(incense.bowAccumY) > C.bowAmplitude) {
    const dir = incense.bowAccumY > 0 ? 'down' : 'up';
    if (dir !== incense.bowLastDir) {
      if (incense.bowDirections.length === 0) incense.bowStartTime = now;
      incense.bowDirections.push(dir);
      incense.bowLastDir = dir;
      incense.bowAccumY = 0;
      if (incense.bowDirections.length >= C.bowsNeeded) {
        triggerBow();
        incense.bowDirections = []; incense.bowLastDir = null;
        incense.bowCooldownUntil = now + C.bowCooldownMs;
      }
    }
  }

  if (incense.bowDirections.length > 0 && now - incense.bowStartTime > C.bowTimeoutMs) {
    incense.bowDirections = []; incense.bowLastDir = null; incense.bowAccumY = 0;
  }
}

function triggerBow() {
  incense.merit++;
  counterValEl.textContent = incense.merit;
  if (Math.random() < C.incenseTriggerChance) {
    playWoodenFish();
    tauriInvoke('trigger_action', { mode: currentMode });
  }
  const msg = C.incenseMessages[Math.floor(Math.random() * C.incenseMessages.length)];
  incense.floatingTexts.push({
    x: mouseX + (Math.random() - 0.5) * 80,
    y: mouseY - C.stickLength - 50,
    text: msg, life: C.floatTextLife, maxLife: C.floatTextLife,
  });
}

function spawnSmoke(x, y) {
  const n = Math.floor(C.smokePerFrame) + (Math.random() < (C.smokePerFrame % 1) ? 1 : 0);
  for (let i = 0; i < n; i++) {
    const life = C.smokeLifeMin + Math.random() * (C.smokeLifeMax - C.smokeLifeMin);
    incense.smokeParticles.push({
      x: x + (Math.random() - 0.5) * 4, y: y + (Math.random() - 0.5) * 2,
      vx: (Math.random() - 0.5) * C.smokeDrift + C.smokeWind,
      vy: -C.smokeRiseSpeed * (0.7 + Math.random() * 0.6),
      radius: C.smokeRadiusMin + Math.random() * (C.smokeRadiusMax - C.smokeRadiusMin),
      life, maxLife: life,
      alpha: C.smokeStartAlpha * (0.7 + Math.random() * 0.3),
      phase: Math.random() * Math.PI * 2,
    });
  }
}

function updateIncenseSmoke() {
  const arr = incense.smokeParticles;
  for (let i = arr.length - 1; i >= 0; i--) {
    const p = arr[i];
    if (--p.life <= 0) { arr.splice(i, 1); continue; }
    p.vx += Math.sin(p.y * C.smokeTurbFreq + p.phase + frame * 0.02) * C.smokeTurbAmp * 0.01;
    p.x += p.vx; p.y += p.vy; p.vy *= 0.998; p.radius += 0.04;
  }
}

function drawIncenseSmoke() {
  const [r, g, b] = C.smokeColor;
  for (const p of incense.smokeParticles) {
    const t = 1 - p.life / p.maxLife;
    const a = p.alpha * (1 - t * t);
    if (a < 0.005) continue;
    const rad = p.radius * (1 + t * 0.8);
    const gr = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, rad);
    gr.addColorStop(0, `rgba(${r},${g},${b},${a})`);
    gr.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.fillStyle = gr;
    ctx.beginPath(); ctx.arc(p.x, p.y, rad, 0, Math.PI * 2); ctx.fill();
  }
}

function updateIncenseFloatingTexts() {
  const arr = incense.floatingTexts;
  for (let i = arr.length - 1; i >= 0; i--) {
    arr[i].y -= C.floatTextRise;
    if (--arr[i].life <= 0) arr.splice(i, 1);
  }
}

function drawIncenseFloatingTexts() {
  for (const ft of incense.floatingTexts) {
    const t = ft.life / ft.maxLife;
    const a = t < 0.3 ? t / 0.3 : (t > 0.7 ? (1 - t) / 0.3 : 1);
    ctx.save();
    ctx.font = `${ft.small ? 20 : 32}px 'Ma Shan Zheng', cursive`;
    ctx.textAlign = 'center';
    ctx.fillStyle = `rgba(245, 217, 154, ${a * 0.9})`;
    ctx.shadowColor = 'rgba(255, 160, 40, 0.4)';
    ctx.shadowBlur = 16;
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.restore();
  }
}

function drawIncense(baseX, baseY, tiltAmount, swayAngle) {
  const angle = tiltAmount * (Math.PI * 0.4);
  const cosA = Math.cos(angle);
  const sinA = Math.sin(angle);
  const apparentLen = C.stickLength * cosA;
  const tipOffsetY = C.stickLength * sinA * 0.3;
  const spacingScale = 0.6 + 0.4 * cosA;
  const widthScale = 1 + Math.abs(tiltAmount) * 0.3;

  ctx.save();
  ctx.translate(baseX, baseY);
  ctx.rotate(swayAngle);

  for (let i = 0; i < C.stickCount; i++) {
    const ox = (i - 1) * C.stickSpacing * spacingScale;
    const splay = (i - 1) * 0.018 * spacingScale;
    ctx.save();
    ctx.translate(ox, 0);
    ctx.rotate(splay);
    const sw = C.stickWidth * (widthScale - Math.abs(splay) * 2);
    const tipY = -apparentLen + tipOffsetY;
    const grad = ctx.createLinearGradient(0, 30, 0, tipY);
    grad.addColorStop(0, C.stickWoodColor);
    grad.addColorStop(0.13, C.stickColor);
    grad.addColorStop(0.94, C.stickBurnColor);
    grad.addColorStop(1.0, C.stickAshColor);
    ctx.strokeStyle = grad; ctx.lineWidth = sw; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(0, 30); ctx.lineTo(0, tipY); ctx.stroke();
    const fl = 0.8 + 0.2 * Math.sin(frame * 0.15 + i * 2.3);
    const eGlow = C.emberGlowRadius * fl * cosA;
    const eRad = C.emberRadius * fl * (0.8 + 0.2 * cosA);
    const glow = ctx.createRadialGradient(0, tipY, 0, 0, tipY, eGlow);
    glow.addColorStop(0, `rgba(255,120,40,${0.3 * fl})`);
    glow.addColorStop(1, 'rgba(255,60,10,0)');
    ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(0, tipY, eGlow, 0, Math.PI * 2); ctx.fill();
    const em = ctx.createRadialGradient(0, tipY, 0, 0, tipY, eRad);
    em.addColorStop(0, '#ffd080'); em.addColorStop(1, 'rgba(200,60,10,0.3)');
    ctx.fillStyle = em; ctx.beginPath(); ctx.arc(0, tipY, eRad, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    if (incense.active || incense.dropping) {
      const localX = ox, localY = tipY;
      const worldTipX = baseX + localX * Math.cos(swayAngle) - localY * Math.sin(swayAngle);
      const worldTipY = baseY + localX * Math.sin(swayAngle) + localY * Math.cos(swayAngle);
      spawnSmoke(worldTipX, worldTipY);
    }
  }
  ctx.restore();
}

function updateIncenseMode() {
  const mouseVelX = mouseX - prevMouseX;
  const mouseVelY = mouseY - prevMouseY;
  if (incense.active && !incense.dropping) {
    incense.tiltVel += mouseVelY * C.tiltFactor;
    incense.tiltVel *= C.tiltDamping;
    incense.tiltVel -= incense.tilt * C.tiltReturn;
    incense.tilt += incense.tiltVel;
    incense.tilt = clamp(incense.tilt, -C.tiltMax, C.tiltMax);
    incense.swayVel += mouseVelX * C.swayFactor;
    incense.swayVel *= C.swayDamping;
    incense.swayVel -= incense.sway * C.swayReturn;
    incense.sway += incense.swayVel;
    incense.sway = clamp(incense.sway, -C.swayMax, C.swayMax);
    detectBow();
  }
  if (incense.dropping) {
    incense.dropVelY += C.dropGravity;
    incense.dropPosY += incense.dropVelY;
    incense.dropRotVel += (Math.random() - 0.5) * 0.003;
    incense.dropRot += incense.dropRotVel;
    if (mouseY + incense.dropPosY > H + 300) {
      incense.active = false; incense.dropping = false;
      tauriHideWindow();
    }
  }
  updateIncenseSmoke();
  updateIncenseFloatingTexts();
}

function drawIncenseMode() {
  drawIncenseSmoke();
  if (incense.active) {
    if (incense.dropping) {
      ctx.save();
      ctx.translate(mouseX, mouseY + incense.dropPosY);
      ctx.rotate(incense.dropRot);
      ctx.translate(-mouseX, -(mouseY + incense.dropPosY));
      drawIncense(mouseX, mouseY + incense.dropPosY, 0, 0);
      ctx.restore();
    } else {
      drawIncense(mouseX, mouseY, incense.tilt, incense.sway);
    }
  }
  drawIncenseFloatingTexts();
}

// ══════════════════════════════════════════════════════════════════════════════
//  SLAPPER MODE STATE
// ══════════════════════════════════════════════════════════════════════════════
const slapper = {
  count: 0,
  swayAngle: 0,
  swayVel: 0,
  jointAngle: 0,
  jointVel: 0,
  lastSlapTime: 0,
  particles: [],
  floatingTexts: [],
  trailAngles: [],
  trailLength: 5,
  shakeX: 0, shakeY: 0, shakeFramesLeft: 0,
};

function slapperReset() {
  slapper.swayAngle = 0;
  slapper.swayVel = 0;
  slapper.jointAngle = 0;
  slapper.jointVel = 0;
  slapper.particles = [];
  slapper.floatingTexts = [];
  slapper.trailAngles = [];
  slapper.shakeFramesLeft = 0;
  slapper.shakeX = 0; slapper.shakeY = 0;
}

function detectSlap() {
  const now = Date.now();
  if (now - slapper.lastSlapTime < C.slapCooldownMs) return;
  if (Math.abs(slapper.swayVel) > C.slapAngVelThreshold) {
    triggerSlap();
    slapper.lastSlapTime = now;
  }
}

function triggerSlap() {
  slapper.count++;
  counterValEl.textContent = slapper.count;
  if (Math.random() < C.slapTriggerChance) {
    playSlap();
    tauriInvoke('trigger_action', { mode: currentMode });
  }
  slapper.shakeFramesLeft = C.shakeDuration;

  const totalLen = C.slapGripLength + C.slapStickLength + C.slapHandHeight * 0.7;
  const tipX = mouseX + Math.sin(slapper.swayAngle) * totalLen;
  const tipY = mouseY - Math.cos(slapper.swayAngle) * totalLen;

  const msg = C.slapMessages[Math.floor(Math.random() * C.slapMessages.length)];
  slapper.floatingTexts.push({
    x: tipX + (Math.random() - 0.5) * 60,
    y: tipY - 20,
    text: msg, life: C.slapFloatTextLife, maxLife: C.slapFloatTextLife,
  });

  const burstDir = slapper.swayVel > 0 ? 1 : -1;
  for (let i = 0; i < 14; i++) {
    const a = (Math.random() - 0.3) * Math.PI * burstDir;
    const speed = 4 + Math.random() * 10;
    slapper.particles.push({
      x: tipX, y: tipY,
      vx: Math.cos(a) * speed * burstDir,
      vy: Math.sin(a) * speed - 2,
      life: 20 + Math.random() * 20,
      maxLife: 40,
      radius: 2 + Math.random() * 4,
      color: Math.random() > 0.5 ? '#ff4444' : '#ffaa44',
    });
  }
  for (let i = 0; i < 5; i++) {
    const a = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 4;
    slapper.particles.push({
      x: tipX, y: tipY,
      vx: Math.cos(a) * speed,
      vy: Math.sin(a) * speed,
      life: 30 + Math.random() * 15,
      maxLife: 45,
      radius: 1.5,
      color: '#fff',
      star: true,
    });
  }
}

function updateSlapperParticles() {
  const arr = slapper.particles;
  for (let i = arr.length - 1; i >= 0; i--) {
    const p = arr[i];
    if (--p.life <= 0) { arr.splice(i, 1); continue; }
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.95; p.vy *= 0.95;
    p.vy += 0.15;
  }
}

function drawSlapperParticles() {
  for (const p of slapper.particles) {
    const t = p.life / p.maxLife;
    ctx.save();
    ctx.globalAlpha = t;
    if (p.star) {
      ctx.translate(p.x, p.y);
      ctx.rotate(frame * 0.1);
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      for (let i = 0; i < 4; i++) {
        const a = (i / 4) * Math.PI * 2;
        ctx.moveTo(0, 0);
        ctx.lineTo(Math.cos(a) * p.radius * 3, Math.sin(a) * p.radius * 3);
      }
      ctx.stroke();
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius * t, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

function updateSlapperFloatingTexts() {
  const arr = slapper.floatingTexts;
  for (let i = arr.length - 1; i >= 0; i--) {
    arr[i].y -= C.slapFloatTextRise;
    if (--arr[i].life <= 0) arr.splice(i, 1);
  }
}

function drawSlapperFloatingTexts() {
  for (const ft of slapper.floatingTexts) {
    const t = ft.life / ft.maxLife;
    const a = t < 0.2 ? t / 0.2 : (t > 0.7 ? (1 - t) / 0.3 : 1);
    const scale = 1 + (1 - t) * 0.3;
    ctx.save();
    ctx.font = `${Math.round(36 * scale)}px 'Ma Shan Zheng', cursive`;
    ctx.textAlign = 'center';
    ctx.fillStyle = `rgba(255, 100, 100, ${a * 0.95})`;
    ctx.shadowColor = 'rgba(255, 50, 50, 0.5)';
    ctx.shadowBlur = 20;
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.restore();
  }
}

function drawStickSegments(startY, endY, totalSegs) {
  const len = startY - endY;
  const segHeight = len / totalSegs;
  for (let i = 0; i < totalSegs; i++) {
    const sy = startY - i * segHeight;
    const color = C.slapStickColors[i % C.slapStickColors.length];
    const nextColor = C.slapStickColors[(i + 1) % C.slapStickColors.length];
    ctx.save();
    ctx.beginPath();
    ctx.rect(-C.slapStickWidth / 2, sy - segHeight, C.slapStickWidth, segHeight);
    ctx.clip();
    ctx.fillStyle = color;
    ctx.fillRect(-C.slapStickWidth / 2, sy - segHeight, C.slapStickWidth, segHeight);
    ctx.fillStyle = nextColor;
    ctx.beginPath();
    ctx.moveTo(-C.slapStickWidth / 2, sy);
    ctx.lineTo(C.slapStickWidth / 2, sy - segHeight * 0.6);
    ctx.lineTo(C.slapStickWidth / 2, sy - segHeight);
    ctx.lineTo(-C.slapStickWidth / 2, sy - segHeight * 0.4);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(-C.slapStickWidth / 2, endY, C.slapStickWidth, len);
}

function drawSlapStick(originX, originY, baseAngle, jointAngle, alpha) {
  const lowerStickLen = C.slapStickLength * C.jointRatio;
  const upperStickLen = C.slapStickLength * (1 - C.jointRatio);
  const lowerSegs = Math.max(1, Math.round(20 * C.jointRatio));
  const upperSegs = Math.max(1, 20 - lowerSegs);

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(originX, originY);
  ctx.rotate(baseAngle);

  // Grip
  ctx.fillStyle = C.slapGripColor;
  ctx.beginPath();
  ctx.roundRect(-C.slapGripWidth / 2, 0, C.slapGripWidth, C.slapGripLength, 4);
  ctx.fill();
  ctx.strokeStyle = C.slapGripRidgeColor;
  ctx.lineWidth = 1.2;
  for (let i = 0; i < 7; i++) {
    const gy = 6 + i * 7;
    ctx.beginPath();
    ctx.moveTo(-C.slapGripWidth / 2 + 2, gy);
    ctx.lineTo(C.slapGripWidth / 2 - 2, gy);
    ctx.stroke();
  }

  // Lower stick segment (grip to joint)
  drawStickSegments(0, -lowerStickLen, lowerSegs);

  // Joint pivot — move to joint position, rotate by jointAngle
  ctx.translate(0, -lowerStickLen);
  ctx.rotate(jointAngle);

  // Upper stick segment (joint to top)
  drawStickSegments(0, -upperStickLen, upperSegs);

  // 愛的小手 — hand-shaped leather paddle (traced from reference)
  ctx.save();
  ctx.translate(0, -upperStickLen);
  ctx.rotate(-0.26); // ~15° CCW to correct reference tilt

  const s = C.slapHandHeight / 65;
  const p = (x, y) => [x * s, y * s];

  function handPath() {
    ctx.moveTo(...p(-5, 0));
    ctx.bezierCurveTo(...p(-8, -8), ...p(-11, -18), ...p(-11, -31));
    ctx.bezierCurveTo(...p(-11, -40), ...p(-9, -49), ...p(-6, -55));
    ctx.bezierCurveTo(...p(-4, -59), ...p(-2, -62), ...p(0, -63));
    ctx.bezierCurveTo(...p(1, -63), ...p(3, -62), ...p(4, -61));
    ctx.bezierCurveTo(...p(5, -61), ...p(7, -63), ...p(9, -63));
    ctx.bezierCurveTo(...p(11, -63), ...p(13, -61), ...p(15, -60));
    ctx.bezierCurveTo(...p(16, -60.5), ...p(18, -61), ...p(20, -61));
    ctx.bezierCurveTo(...p(22, -60.5), ...p(24, -59), ...p(26, -56));
    ctx.bezierCurveTo(...p(27, -54), ...p(28, -53.5), ...p(29.5, -53.5));
    ctx.bezierCurveTo(...p(31, -53.5), ...p(33, -52), ...p(35, -48));
    ctx.bezierCurveTo(...p(35.5, -44), ...p(35, -41), ...p(34, -38));
    ctx.bezierCurveTo(...p(33, -35), ...p(31.5, -32.5), ...p(31, -31));
    ctx.bezierCurveTo(...p(30.5, -29.5), ...p(33, -28), ...p(36, -25));
    ctx.bezierCurveTo(...p(36, -20), ...p(33, -14), ...p(28, -9));
    ctx.bezierCurveTo(...p(22, -5), ...p(14, -1), ...p(8, 1));
    ctx.bezierCurveTo(...p(4, 2), ...p(-1, 1), ...p(-5, 0));
  }

  ctx.fillStyle = C.slapHandColor;
  ctx.strokeStyle = C.slapHandOutline;
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';

  ctx.beginPath();
  handPath();
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Stitch: inner outline (scaled 0.92 from hand center)
  ctx.strokeStyle = C.slapStitchColor || 'rgba(180,170,150,0.7)';
  ctx.lineWidth = 1.2;
  ctx.setLineDash([3, 3.5]);

  ctx.save();
  const centerX = 12 * s, centerY = -31 * s;
  ctx.translate(centerX, centerY);
  ctx.scale(0.92, 0.92);
  ctx.translate(-centerX, -centerY);
  ctx.beginPath();
  handPath();
  ctx.closePath();
  ctx.stroke();
  ctx.restore();

  // Stitch: finger seam lines (traced from reference)
  const seams = [
    [{ x: 2.5, y: -52 }, { x: 1.6, y: -48 }, { x: 0.6, y: -42 }, { x: -0.4, y: -38 }],
    [{ x: 12, y: -51 }, { x: 11, y: -48 }, { x: 10, y: -45 }, { x: 9, y: -41 }, { x: 8, y: -36 }],
    [{ x: 24, y: -49 }, { x: 22, y: -43 }, { x: 21, y: -39 }, { x: 19, y: -36 }, { x: 18, y: -34 }],
  ];
  for (const seam of seams) {
    ctx.beginPath();
    ctx.moveTo(seam[0].x * s, seam[0].y * s);
    for (let i = 1; i < seam.length; i++) ctx.lineTo(seam[i].x * s, seam[i].y * s);
    ctx.stroke();
  }

  ctx.setLineDash([]);
  ctx.restore(); // hand
  ctx.restore(); // main
}

function updateSlapperMode() {
  const mouseVelX = mouseX - prevMouseX;

  // Lower segment (base) physics
  slapper.swayVel += mouseVelX * C.swaySlapFactor;
  slapper.swayVel *= C.swaySlapDamping;
  slapper.swayVel -= slapper.swayAngle * C.swaySlapReturn;
  slapper.swayAngle += slapper.swayVel;
  slapper.swayAngle = clamp(slapper.swayAngle, -C.swaySlapMax, C.swaySlapMax);

  // Upper segment (joint) physics — driven by base angular velocity
  slapper.jointVel += slapper.swayVel * C.jointFactor;
  slapper.jointVel *= C.jointDamping;
  slapper.jointVel -= slapper.jointAngle * C.jointReturn;
  slapper.jointAngle += slapper.jointVel;
  slapper.jointAngle = clamp(slapper.jointAngle, -C.jointMax, C.jointMax);

  slapper.trailAngles.unshift({ base: slapper.swayAngle, joint: slapper.jointAngle });
  if (slapper.trailAngles.length > slapper.trailLength) slapper.trailAngles.pop();

  detectSlap();

  if (slapper.shakeFramesLeft > 0) {
    const intensity = C.shakeIntensity * (slapper.shakeFramesLeft / C.shakeDuration);
    slapper.shakeX = (Math.random() - 0.5) * intensity * 2;
    slapper.shakeY = (Math.random() - 0.5) * intensity * 2;
    slapper.shakeFramesLeft--;
  } else {
    slapper.shakeX = 0; slapper.shakeY = 0;
  }

  updateSlapperParticles();
  updateSlapperFloatingTexts();
}

function drawSlapperMode() {
  ctx.save();
  ctx.translate(slapper.shakeX, slapper.shakeY);

  // Motion trail
  for (let i = slapper.trailAngles.length - 1; i >= 1; i--) {
    const alpha = 0.1 * (1 - i / slapper.trailLength);
    const t = slapper.trailAngles[i];
    drawSlapStick(mouseX, mouseY, t.base, t.joint, alpha);
  }

  drawSlapStick(mouseX, mouseY, slapper.swayAngle, slapper.jointAngle, 1.0);

  drawSlapperParticles();
  drawSlapperFloatingTexts();

  ctx.restore();
}

// ══════════════════════════════════════════════════════════════════════════════
//  MODE SWITCHING
// ══════════════════════════════════════════════════════════════════════════════
function applyModeUI() {
  if (currentMode === 'slapper') {
    document.body.classList.add('slapper-mode');
    counterLabelEl.textContent = '巴掌：';
    counterValEl.textContent = slapper.count;
    hintEl.textContent = '左右揮動滑鼠巴 Claude';
  } else {
    document.body.classList.remove('slapper-mode');
    counterLabelEl.textContent = '功德：';
    counterValEl.textContent = incense.merit;
    hintEl.textContent = '上下移動滑鼠拜拜 · 點擊放下香';
  }
}

function switchMode(mode) {
  if (mode !== 'incense' && mode !== 'slapper') return;
  currentMode = mode;
  // Clear leftover visuals
  incenseReset();
  slapperReset();
  applyModeUI();
}

tauriListen('switch-mode', (event) => {
  const m = typeof event.payload === 'string' ? event.payload : (event.payload && event.payload.mode);
  if (m) switchMode(m);
});

tauriListen('spawn-incense', (event) => {
  const p = event.payload;
  if (p && typeof p.x === 'number') {
    mouseX = p.x; mouseY = p.y;
    prevMouseX = mouseX; prevMouseY = mouseY;
  }
  // Reset incense mode state
  incense.active = true;
  incense.dropping = false;
  incense.tilt = 0; incense.tiltVel = 0;
  incense.sway = 0; incense.swayVel = 0;
  incense.bowDirections = []; incense.bowLastDir = null; incense.bowAccumY = 0;
});

// Click the overlay → hide it immediately, returning focus/mouse to Claude Code
document.addEventListener('mousedown', () => {
  tauriHideWindow();
});

// Browser-testing shortcuts
document.addEventListener('keydown', (e) => {
  if (e.key === '1') switchMode('incense');
  else if (e.key === '2') switchMode('slapper');
});

// ══════════════════════════════════════════════════════════════════════════════
//  MAIN LOOP
// ══════════════════════════════════════════════════════════════════════════════
function update() {
  if (currentMode === 'incense') updateIncenseMode();
  else updateSlapperMode();
  prevMouseX = mouseX; prevMouseY = mouseY;
  frame++;
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = `rgba(0,0,0,${C.bgAlpha})`;
  ctx.fillRect(0, 0, W, H);
  if (currentMode === 'incense') drawIncenseMode();
  else drawSlapperMode();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }

applyModeUI();
loop();
</script>
</body>
</html>
